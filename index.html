            const footerTimeDisplay = document.getElementById('footerTimeDisplay');
            const etaDisplay = document.getElementById('etaDisplay');
            
            // Элементы модального окна
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const timeModeSelect = document.getElementById('timeModeSelect');
            const customTimeContainer = document.getElementById('customTimeContainer');
            const customTime = document.getElementById('customTime');
            const timeSlider = document.getElementById('timeSlider');

            const saveSettingsBtn = document.getElementById('saveSettingsBtn');

            // Массивы для хранения ссылок на элементы цифр

            // Состояние

            let attempts = 0;
            let isCracking = false;
            let found = false;
            let startTime = null;

            // Для синхронизации
            let progressInterval = null;

            // ---- Создание 6 цифровых блоков ----
            function createDigitDisplays() {
                digitContainer.innerHTML = '';
                for (let i = 0; i < DIGIT_COUNT; i++) {
                    const block = document.createElement('div');
                    block.className = 'digit-block';
                    
                    const label = document.createElement('div');
                    label.className = 'digit-label';
                    label.textContent = `БЛОК ${i + 1}`;
                    
                    const digit = document.createElement('div');
                    digit.className = 'digit';
                    digit.id = `digit${i}`;
                    digit.textContent = '0';
                    
                    block.appendChild(label);
                    block.appendChild(digit);
                    digitContainer.appendChild(block);
                    
                    digitElements.push(digit);
                }
            }

            // ---- Функция для генерации случайных цифр (для атмосферы) ----
            function generateRandomCode() {
                return [
                    Math.floor(Math.random() * 10),
                    Math.floor(Math.random() * 10),
                    Math.floor(Math.random() * 10),
                    Math.floor(Math.random() * 10),
                    Math.floor(Math.random() * 10),
                    Math.floor(Math.random() * 10)
                ];
            }

            // ---- Обновление отображения времени и прогресса ----
            function updateProgressAndTime() {
                if (!isCracking || found || !startTime) return;
                
                const elapsed = (Date.now() - startTime) / 1000;
                const progress = Math.min(100, (elapsed / targetTimeSeconds) * 100);
                const remaining = Math.max(0, targetTimeSeconds - elapsed);
                
                // Обновляем прогресс бар
                progressBar.style.width = progress + '%';
                
                // Обновляем цифры случайными значениями для атмосферы
                const randomCode = generateRandomCode();
                for (let i = 0; i < DIGIT_COUNT; i++) {
                    digitElements[i].textContent = randomCode[i];
                }
                
                // Обновляем счетчик попыток (для атмосферы)
                attempts = Math.floor(progress * 10000);
                attemptSpan.textContent = attempts.toLocaleString();
                attemptDisplay.textContent = `[ATTEMPT: ${attempts.toLocaleString()}/1M]`;

                etaDisplay.innerHTML = `⏳ ПРОГРЕСС: ${progress.toFixed(1)}% | ДО ВЗЛОМА: ${remaining.toFixed(1)}s`;
                
                // Проверяем, не настал ли момент для показа кода
                if (elapsed >= targetTimeSeconds && !found) {
                    showSuccess();
                }
            }

            // ---- Показать успешный взлом ----
            function showSuccess() {
                found = true;
                isCracking = false;
                
                // Останавливаем все интервалы
                if (progressInterval) {
                    clearInterval(progressInterval);
                    progressInterval = null;
                }
                
                // Устанавливаем код 090892 на дисплей
                for (let i = 0; i < DIGIT_COUNT; i++) {
                    digitElements[i].textContent = FIXED_TARGET_CODE[i];
                }
                
                // Прогресс бар на 100%
                progressBar.style.width = '100%';
                
                // Обновляем статус (убрано слово "ПРИНЯТ")
                statusEl.textContent = '🔓 [ ВЗЛОМАН ] КОД 090892 🔓';
                statusEl.style.color = '#ffff00';
                foundSpan.textContent = FIXED_TARGET_CODE.join('');
                foundSpan.classList.add('code-found');
                
                // Добавляем эффект пульсации для всех цифр
                digitElements.forEach(el => {
                    el.classList.add('code-found');
                });
                
                // Финальное сообщение в матрице
                addMatrixLog(`>>> УСПЕХ! КОД: ${FIXED_TARGET_CODE.join('')} (090892) <<<`);
                addMatrixLog(`>>> ВРЕМЯ: ${targetTimeSeconds}.0s / ${targetTimeSeconds}.0s <<<`);
                
                // Обновляем счетчик попыток
                attempts = 908922;
                attemptSpan.textContent = attempts.toLocaleString();
                attemptDisplay.textContent = `[ATTEMPT: ${attempts.toLocaleString()}/1M]`;
                
                // Финальное время
                etaDisplay.innerHTML = `⏳ ПРОГРЕСС: 100.0% | ВЗЛОМАН ЗА ${targetTimeSeconds}.0s`;
            }

            // ---- добавить лог в матрицу ----
            function addMatrixLog(text) {
                let lines = matrixDiv.innerHTML.split('<br>');
                lines.push(`> ${text}`);
                if (lines.length > 6) lines.shift();
                matrixDiv.innerHTML = lines.join('<br>');
            }

            // ---- Обновление отображения настроек времени ----
            function updateTimeSettingsDisplay() {
                timeSettingDisplay.textContent = targetTimeSeconds;
                footerTimeDisplay.textContent = targetTimeSeconds;
                timeSlider.value = targetTimeSeconds;
                timeValue.textContent = targetTimeSeconds + ' с';
                etaDisplay.innerHTML = `⏳ ПРОГРЕСС: 0.0% | ДО ВЗЛОМА: ${targetTimeSeconds}.0s`;
            }

            // ---- Сброс состояния ----
            function resetState() {
                // Останавливаем всё
                isCracking = false;
                found = false;
                
                if (progressInterval) {
                    clearInterval(progressInterval);
                    progressInterval = null;
                }
                
                // Сбрасываем отображение
                currentCode = new Array(DIGIT_COUNT).fill(0);
                for (let i = 0; i < DIGIT_COUNT; i++) {
                    digitElements[i].textContent = '0';
                }
                
                attempts = 0;
                attemptSpan.textContent = '0';
                attemptDisplay.textContent = '[ATTEMPT: 0/1M]';
                
                progressBar.style.width = '0%';
                
                foundSpan.textContent = '???';
                foundSpan.classList.remove('code-found');
                digitElements.forEach(el => {
                    el.classList.remove('code-found');
                });
                
                statusEl.textContent = '⛔ СИСТЕМА ГОТОВА';
                statusEl.style.color = '#adff2f';
                
                updateTimeSettingsDisplay();
                
                // Очищаем матрицу при сбросе
                matrixDiv.innerHTML = '> INITIALIZING SEQUENCE...<br>> SAFE LOCK DETECTED: 6x ROTORS (0-9)<br>> BRUTEFORCE MODE ENABLED';
            }

            // ---- Запуск взлома ----
            function startCracking() {
                if (found) {
                    addMatrixLog('> CODE ALREADY FOUND. RESET FIRST.');
                    return;
                }
                if (isCracking) return;
                
                // Сбрасываем на нули перед стартом
                for (let i = 0; i < DIGIT_COUNT; i++) {
                    digitElements[i].textContent = '0';
                }
                
                isCracking = true;
                startTime = Date.now();
                
                statusEl.textContent = `🔐 ВЗЛОМ... [${targetTimeSeconds}s]`;
                statusEl.style.color = '#00ff00';
                
                addMatrixLog(`> CRACK INITIATED`);
                addMatrixLog(`> SYNCHRONIZED FOR ${targetTimeSeconds}.0s`);
                
                // Запускаем интервал обновления прогресса
                if (progressInterval) clearInterval(progressInterval);
                progressInterval = setInterval(updateProgressAndTime, 50);
            }

            // ---- остановка ----
            function stopCracking() {
                if (isCracking) {
                    isCracking = false;
                    
                    if (progressInterval) {
                        clearInterval(progressInterval);
                        progressInterval = null;
                    }
                    
                    statusEl.textContent = '⏸️ ОСТАНОВЛЕНО';
                    addMatrixLog('> CRACK PAUSED');
                }
            }

            // ---- сброс ----
            function resetAndNew() {
                stopCracking();
                resetState();
            }

            // ---- инициализация ----
            createDigitDisplays();
            resetState();

            // ---- слушатели для кнопок ----
            startBtn.addEventListener('click', startCracking);
            stopBtn.addEventListener('click', stopCracking);
            resetBtn.addEventListener('click', resetAndNew);

            // ---- слушатели для модального окна ----
            settingsBtn.addEventListener('click', () => {
                timeModeSelect.value = customTimeContainer.style.display === 'block' ? 'custom' : targetTimeSeconds.toString();
                customTime.value = targetTimeSeconds;
                timeSlider.value = targetTimeSeconds;
                timeValue.textContent = targetTimeSeconds + ' с';
                settingsModal.style.display = 'flex';
            });

            closeSettingsBtn.addEventListener('click', () => {
                settingsModal.style.display = 'none';
            });

            // Обработчик изменения режима времени
            timeModeSelect.addEventListener('change', () => {
                const mode = timeModeSelect.value;
                if (mode === 'custom') {
                    customTimeContainer.style.display = 'block';
                } else {
                    customTimeContainer.style.display = 'none';
                    const seconds = parseInt(mode);
                    timeSlider.value = seconds;
                    timeValue.textContent = seconds + ' с';
                }
            });

            // Обновление значения слайдера
            timeSlider.addEventListener('input', () => {
                const seconds = parseInt(timeSlider.value);
                timeValue.textContent = seconds + ' с';
                
                if (timeModeSelect.value === 'custom') {
                    customTime.value = seconds;
                }
            });

            saveSettingsBtn.addEventListener('click', () => {
                let newTime = targetTimeSeconds;
                
                if (timeModeSelect.value === 'custom') {
                    newTime = parseInt(customTime.value);
                } else {
                    newTime = parseInt(timeModeSelect.value);
                }
                
                if (newTime && newTime > 0 && newTime <= 300) {
                    targetTimeSeconds = newTime;
                    updateTimeSettingsDisplay();
                    addMatrixLog(`> TIME UPDATED: ${targetTimeSeconds}s`);
                    
                    if (!isCracking) {
                        etaDisplay.innerHTML = `⏳ ПРОГРЕСС: 0.0% | ДО ВЗЛОМА: ${targetTimeSeconds}.0s`;
                    }
                }
                
                settingsModal.style.display = 'none';
            });

            // Закрытие по клику на оверлей
            settingsModal.addEventListener('click', (e) => {
                if (e.target === settingsModal) {
                    settingsModal.style.display = 'none';
                }
            });

            // ---- PWA установка ----
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
            });
        })();
    </script>
</body>
</html>
